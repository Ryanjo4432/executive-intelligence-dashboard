version: "3.9"

services:
  pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: eid_pipeline
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./python:/app/python
      - ./sql:/app/sql
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "python/run_pipeline.py"]

  jupyter:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: eid_jupyter
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8888:8888"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["jupyter", "notebook", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--NotebookApp.token=''"]
